$kind: http-request
name: Update account subscription tier
method: PATCH
url: '{{base_url}}/accounts/ACC-1001/tier'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "tier": "premium"
    }
responses:
  - name: Tier updated; returns full account
    statusCode: 200
    body:
      content: |-
        {
          "id": "ACC-1001",
          "name": "Northwind Traders",
          "industry": "Retail",
          "status": "active",
          "tier": "premium"
        }
event:
  - listen: test
    script:
      exec: |
        pm.test('Status is 200', () => pm.response.to.have.status(200));
        pm.test('Updated account has tier', () => {
          pm.expect(pm.response.json()).to.have.property('tier');
          pm.expect(pm.response.json().tier).to.eql('premium');
        });
      language: json
