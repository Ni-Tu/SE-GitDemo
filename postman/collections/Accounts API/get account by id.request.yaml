$kind: http-request
method: GET
url: '{{base_url}}/accounts/:id'
order: 2000
pathVariables:
  - key: id
    value: '{{accountId}}'
event:
  - listen: test
    script:
      exec: |
        pm.test('Status is 200', () => pm.response.to.have.status(200));
        pm.test('Has account id', () => {
          pm.expect(pm.response.json().id).to.eql(pm.variables.get('accountId'));
        });
      language: json
